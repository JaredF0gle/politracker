<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PoliTrack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      --state-bar-height: 44px;
      --category-bar-height: 38px;
      --top-controls-height: calc(var(--state-bar-height) + var(--category-bar-height));
      background: #0a0f1e;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
    }

    .state-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--state-bar-height);
      z-index: 40;
      background: #0f172a;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0 1rem;
      border-bottom: 1px solid #1e293b;
    }

    .state-controls {
      display: flex;
      flex-direction: column;
      gap: 0.08rem;
    }

    .state-bar label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #cbd5e1;
    }

    .state-select {
      height: 28px;
      min-width: 66px;
      border: 1px solid #334155;
      border-radius: 7px;
      background: #111827;
      color: #fff;
      font-size: 0.78rem;
      padding: 0 0.45rem;
    }

    .state-indicator {
      font-size: 0.62rem;
      color: #64748b;
      line-height: 1;
    }

    .category-filter-bar {
      position: fixed;
      top: var(--state-bar-height);
      left: 0;
      right: 0;
      height: var(--category-bar-height);
      z-index: 39;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0 1rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-filter-bar::-webkit-scrollbar { display: none; }

    .category-pill {
      border: 0;
      border-radius: 999px;
      background: #1e293b;
      color: #fff;
      padding: 0.32rem 0.68rem;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .category-pill.active {
      background: #f59e0b;
      color: #0f172a;
    }

    #feed {
      height: calc(100dvh - var(--top-controls-height));
      margin-top: var(--top-controls-height);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    #feed::-webkit-scrollbar { display: none; }

    /* Card */
    .card {
      height: calc(100dvh - var(--top-controls-height));
      scroll-snap-align: start;
      scroll-snap-stop: always;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 6rem;
      gap: 0.9rem;
      position: relative;
    }

    .card.your-rep {
      border: 2px solid #f59e0b;
    }

    /* Photo / initials */
    .photo-wrap {
      width: 110px;
      height: 138px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: #111827;
      position: relative;
    }

    .your-rep-badge {
      position: absolute;
      top: 7px;
      left: 7px;
      z-index: 1;
      background: #f59e0b;
      color: #0f172a;
      border-radius: 999px;
      padding: 0.16rem 0.38rem;
      font-size: 0.52rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .initials-block {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .init-D { background: #1e3a8a; }
    .init-R { background: #7f1d1d; }
    .init-I { background: #1f2937; }

    /* Name */
    .member-name {
      font-size: clamp(1.15rem, 4.5vw, 1.75rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.01em;
      color: #fff;
      text-align: center;
      max-width: 340px;
    }

    /* Party + state */
    .member-sub {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .party-badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }
    .party-D { background: #1d4ed8; color: #fff; }
    .party-R { background: #b91c1c; color: #fff; }
    .party-I { background: #374151; color: #d1d5db; }

    .member-state {
      font-size: 0.85rem;
      color: #6b7280;
    }

    /* Vote result — dominant visual */
    .vote-result {
      font-size: clamp(4rem, 22vw, 8rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      text-align: center;
    }
    .v-yea   { color: #22c55e; }
    .v-nay   { color: #ef4444; }
    .v-other { color: #4b5563; }

    /* Bottom bill bar */
    .bill-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0d1528;
      border-top: 2px solid #1e3a5f;
      padding: 1rem 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .bill-number {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #60a5fa;
    }

    .bill-question {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bill-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.78rem;
      margin-top: 0.1rem;
    }

    .bill-meta-result {
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .bill-meta-date {
      color: #475569;
    }

    .bill-category-chip {
      align-self: flex-start;
      background: #1e293b;
      color: #94a3b8;
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      font-size: 0.62rem;
      font-weight: 700;
    }

    /* Detail panel */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: transparent;
    }
    .detail-overlay.open { display: block; }

    .detail-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60dvh;
      z-index: 51;
      background: #111827;
      border-top: 1px solid #1e3a5f;
      border-radius: 16px 16px 0 0;
      padding: 1.25rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      overflow-y: auto;
    }
    .detail-panel.open { transform: translateY(0); }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .panel-bill-num {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.01em;
      color: #fff;
      line-height: 1.2;
    }

    .panel-close {
      background: #1f2937;
      border: none;
      color: #9ca3af;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .panel-close:hover { background: #374151; color: #fff; }

    .panel-bill-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.4;
    }

    .panel-bill-title.loading {
      color: #475569;
      font-weight: 400;
      font-style: italic;
      font-size: 0.9rem;
    }

    .panel-link {
      display: inline-block;
      font-size: 0.85rem;
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
    }
    .panel-link:hover { text-decoration: underline; }

    .panel-meta {
      font-size: 0.82rem;
      color: #6b7280;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .panel-meta-result {
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .panel-counts {
      display: flex;
      gap: 0.75rem;
    }

    .count-block {
      flex: 1;
      background: #1f2937;
      border-radius: 10px;
      padding: 0.85rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .count-num {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .count-num.yea  { color: #22c55e; }
    .count-num.nay  { color: #ef4444; }
    .count-num.nvot { color: #4b5563; }

    .count-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #4b5563;
    }

    /* Bill bar tap hint */
    .bill-tap-hint {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #334155;
      text-align: right;
      margin-top: 0.1rem;
    }

    .bill-bar { cursor: pointer; }
    .bill-bar:hover { background: #121e38; }

    /* Loading / Error */
    #loading {
      height: calc(100dvh - var(--top-controls-height));
      margin-top: var(--top-controls-height);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #475569;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      display: none;
      height: calc(100dvh - var(--top-controls-height));
      margin-top: var(--top-controls-height);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.75rem;
      color: #f87171;
      text-align: center;
      padding: 2rem;
    }
  </style>
</head>
<body>

<div class="state-bar">
  <label for="state-select">My State:</label>
  <div class="state-controls">
    <select id="state-select" class="state-select" aria-label="My State">
      <option value="">All States</option>
    </select>
    <div id="state-indicator" class="state-indicator">Showing: All representatives</div>
  </div>
</div>

<div id="category-filter-bar" class="category-filter-bar">
  <button class="category-pill active" data-category="">All</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading votes&hellip;</span>
</div>

<div id="error">
  <strong>Could not load vote data.</strong>
  <span>Make sure the server is running at localhost:3000.</span>
</div>

<div id="feed" hidden></div>

<div id="detail-overlay" class="detail-overlay"></div>
<div id="detail-panel" class="detail-panel">
  <div class="panel-header">
    <div id="panel-bill-num" class="panel-bill-num"></div>
    <button id="panel-close" class="panel-close" aria-label="Close">&#x2715;</button>
  </div>
  <div id="panel-bill-title" class="panel-bill-title"></div>
  <a id="panel-link" class="panel-link" href="#" target="_blank" rel="noopener"></a>
  <div id="panel-meta" class="panel-meta">
    <span id="panel-result" class="panel-meta-result"></span>
    <span id="panel-date"></span>
  </div>
  <div class="panel-counts">
    <div class="count-block">
      <div id="panel-yea" class="count-num yea">—</div>
      <div class="count-label">Yea</div>
    </div>
    <div class="count-block">
      <div id="panel-nay" class="count-num nay">—</div>
      <div class="count-label">Nay</div>
    </div>
    <div class="count-block">
      <div id="panel-nvot" class="count-num nvot">—</div>
      <div class="count-label">Not Voting</div>
    </div>
  </div>
</div>

<script>
  let rollCalls = [];
  let rollCallIndex = 0;
  let busy = false;
  let sentinel = null;
  let endObserver = null;
  const allCards = [];
  const billCategoryCache = {};
  const knownCategories = new Set();
  const STATE_STORAGE_KEY = 'politracker_state';
  const US_STATES = [
    'AL', 'AK', 'AZ', 'AR', 'CA', 'CO', 'CT', 'DE', 'FL', 'GA',
    'HI', 'ID', 'IL', 'IN', 'IA', 'KS', 'KY', 'LA', 'ME', 'MD',
    'MA', 'MI', 'MN', 'MS', 'MO', 'MT', 'NE', 'NV', 'NH', 'NJ',
    'NM', 'NY', 'NC', 'ND', 'OH', 'OK', 'OR', 'PA', 'RI', 'SC',
    'SD', 'TN', 'TX', 'UT', 'VT', 'VA', 'WA', 'WV', 'WI', 'WY'
  ];
  const STATE_NAMES = {
    AL: 'Alabama', AK: 'Alaska', AZ: 'Arizona', AR: 'Arkansas', CA: 'California',
    CO: 'Colorado', CT: 'Connecticut', DE: 'Delaware', FL: 'Florida', GA: 'Georgia',
    HI: 'Hawaii', ID: 'Idaho', IL: 'Illinois', IN: 'Indiana', IA: 'Iowa',
    KS: 'Kansas', KY: 'Kentucky', LA: 'Louisiana', ME: 'Maine', MD: 'Maryland',
    MA: 'Massachusetts', MI: 'Michigan', MN: 'Minnesota', MS: 'Mississippi', MO: 'Missouri',
    MT: 'Montana', NE: 'Nebraska', NV: 'Nevada', NH: 'New Hampshire', NJ: 'New Jersey',
    NM: 'New Mexico', NY: 'New York', NC: 'North Carolina', ND: 'North Dakota', OH: 'Ohio',
    OK: 'Oklahoma', OR: 'Oregon', PA: 'Pennsylvania', RI: 'Rhode Island', SC: 'South Carolina',
    SD: 'South Dakota', TN: 'Tennessee', TX: 'Texas', UT: 'Utah', VT: 'Vermont',
    VA: 'Virginia', WA: 'Washington', WV: 'West Virginia', WI: 'Wisconsin', WY: 'Wyoming'
  };
  const categoryMap = {
    "Agriculture and Food": "Agriculture",
    "Animals": "Environment",
    "Armed Forces and National Security": "Defense",
    "Arts, Culture, Religion": "Culture",
    "Civil Rights and Liberties, Minority Issues": "Civil Rights",
    "Commerce": "Economy",
    "Congress": "Government",
    "Crime and Law Enforcement": "Public Safety",
    "Economics and Public Finance": "Economy",
    "Education": "Education",
    "Emergency Management": "Public Safety",
    "Energy": "Energy",
    "Environmental Protection": "Environment",
    "Families": "Families",
    "Finance and Financial Sector": "Economy",
    "Foreign Policy": "Foreign Policy",
    "Government Operations and Politics": "Government",
    "Health": "Healthcare",
    "Housing and Community Development": "Housing",
    "Immigration": "Immigration",
    "International Affairs": "Foreign Policy",
    "Labor and Employment": "Labor",
    "Law": "Justice",
    "Native Americans": "Civil Rights",
    "Public Lands and Natural Resources": "Environment",
    "Science, Technology, Communications": "Technology",
    "Social Sciences and History": "Culture",
    "Social Welfare": "Social Welfare",
    "Sports and Recreation": "Culture",
    "Taxation": "Taxes",
    "Transportation and Public Works": "Transportation",
    "Water Resources Development": "Environment"
  };
  let selectedState = (localStorage.getItem(STATE_STORAGE_KEY) || '').toUpperCase();
  let selectedCategory = '';
  if (!US_STATES.includes(selectedState)) selectedState = '';

  function partyCode(raw) {
    if (!raw) return 'I';
    const p = raw.trim().toUpperCase();
    if (p === 'D' || p.startsWith('DEM')) return 'D';
    if (p === 'R' || p.startsWith('REP')) return 'R';
    return 'I';
  }

  function initials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    return parts.length === 1
      ? parts[0][0].toUpperCase()
      : (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function voteClass(pos) {
    if (!pos) return 'v-other';
    const p = pos.toLowerCase();
    if (p === 'yea' || p === 'yes' || p === 'aye') return 'v-yea';
    if (p === 'nay' || p === 'no') return 'v-nay';
    return 'v-other';
  }

  function voteDisplay(pos) {
    if (!pos) return 'NOT VOTING';
    const p = pos.toLowerCase();
    if (p === 'yea' || p === 'yes' || p === 'aye') return 'YEA';
    if (p === 'nay' || p === 'no') return 'NAY';
    return pos.toUpperCase();
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function makeInitials(text, pc) {
    const el = document.createElement('div');
    el.className = 'initials-block init-' + pc;
    el.textContent = text;
    return el;
  }

  function updateStateIndicator() {
    const indicator = document.getElementById('state-indicator');
    indicator.textContent = selectedState
      ? 'Showing: ' + STATE_NAMES[selectedState] + ' reps'
      : 'Showing: All representatives';
  }

  function applyFilters() {
    allCards.forEach(card => {
      const matchesState = !selectedState || card.dataset.state === selectedState;
      const matchesCategory = !selectedCategory || card.dataset.category === selectedCategory;
      card.style.display = matchesState && matchesCategory ? 'flex' : 'none';
    });
    updateStateIndicator();
  }

  function initStateSelector() {
    const select = document.getElementById('state-select');
    US_STATES.forEach(state => {
      const option = document.createElement('option');
      option.value = state;
      option.textContent = state;
      select.appendChild(option);
    });
      select.value = selectedState;
      updateStateIndicator();
      select.addEventListener('change', () => {
        selectedState = select.value.toUpperCase();
        localStorage.setItem(STATE_STORAGE_KEY, selectedState);
        applyFilters();
      });
  }

  function renderCategoryPills() {
    const bar = document.getElementById('category-filter-bar');
    bar.innerHTML = '';

    [''].concat([...knownCategories].sort()).forEach(category => {
      const pill = document.createElement('button');
      pill.className = 'category-pill' + (category === selectedCategory ? ' active' : '');
      pill.dataset.category = category;
      pill.textContent = category || 'All';
      pill.addEventListener('click', () => {
        selectedCategory = category;
        renderCategoryPills();
        applyFilters();
      });
      bar.appendChild(pill);
    });
  }

  function rollCallKey(rollCall) {
    return String(rollCall.rollCallNumber);
  }

  function applyCategoryToRollCall(rollCall, category) {
    if (!category) return;
    rollCall._category = category;
    knownCategories.add(category);

    allCards
      .filter(card => card.dataset.rollCall === rollCallKey(rollCall))
      .forEach(card => {
        card.dataset.category = category;
        const chip = card.querySelector('.bill-category-chip');
        if (chip) {
          chip.textContent = category;
          chip.style.display = '';
        }
      });

    renderCategoryPills();
    applyFilters();
  }

  async function loadBillDetails(rollCall) {
    const key = rollCallKey(rollCall);
    if (billCategoryCache[key]) return billCategoryCache[key];

    const type = (rollCall.legislationType || '').toLowerCase();
    const num  = rollCall.legislationNumber || '';
    if (!type || !num) return null;

    billCategoryCache[key] = fetch('http://localhost:3000/api/bill/119/' + type + '/' + num)
      .then(r => r.json())
      .then(d => {
        const rawPolicyArea = d.bill?.policyArea?.name || '';
        const category = categoryMap[rawPolicyArea] || rawPolicyArea || '';
        if (category) applyCategoryToRollCall(rollCall, category);
        return d;
      })
      .catch(() => {
        delete billCategoryCache[key];
        return null;
      });

    return billCategoryCache[key];
  }

  // Panel open/close
  const panel   = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');

  function openPanel(rollCall) {
    const billNum  = [rollCall.legislationType, rollCall.legislationNumber].filter(Boolean).join(' ');
    const question = rollCall.voteQuestion || rollCall.voteType || '';
    const result   = rollCall.result || '';
    const date     = formatDate(rollCall.startDate);
    const url      = rollCall.legislationUrl || rollCall.url || '';

    document.getElementById('panel-bill-num').textContent = [billNum, question].filter(Boolean).join(' — ') || 'Congressional Vote';

    const linkEl = document.getElementById('panel-link');
    if (url) { linkEl.href = url; linkEl.textContent = 'View on Congress.gov'; linkEl.style.display = ''; }
    else { linkEl.style.display = 'none'; }

    document.getElementById('panel-result').textContent = result ? 'Result: ' + result : '';
    document.getElementById('panel-date').textContent   = date;

    const titleEl = document.getElementById('panel-bill-title');
    if (rollCall.legislationType && rollCall.legislationNumber) {
      titleEl.textContent = 'Loading bill details...';
      titleEl.className = 'panel-bill-title loading';
      loadBillDetails(rollCall)
        .then(d => {
          const title = d?.bill?.title || '';
          if (title) { titleEl.textContent = title; titleEl.className = 'panel-bill-title'; }
          else { titleEl.textContent = ''; }
        })
        .catch(() => { titleEl.textContent = ''; });
    } else {
      titleEl.textContent = '';
    }

    const members = rollCall._members || [];
    let yea = 0, nay = 0, nvot = 0;
    members.forEach(m => {
      const v = m.voteCast;
      if (v === 'Yea') yea++;
      else if (v === 'Nay') nay++;
      else nvot++;
    });
    document.getElementById('panel-yea').textContent  = yea;
    document.getElementById('panel-nay').textContent  = nay;
    document.getElementById('panel-nvot').textContent = nvot;

    panel.classList.add('open');
    overlay.classList.add('open');
  }

  function closePanel() {
    panel.classList.remove('open');
    overlay.classList.remove('open');
  }

  document.getElementById('panel-close').addEventListener('click', closePanel);
  overlay.addEventListener('click', closePanel);

  function buildCard(member, rollCall) {
    const bioId = member.bioguideID || '';
    const name  = [member.firstName, member.lastName].filter(Boolean).join(' ') || 'Unknown';
    const party = member.voteParty || '';
    const state = member.voteState || '';
    const pos   = member.voteCast  || '';
    const pc    = partyCode(party);

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.state = state;
    card.dataset.rollCall = rollCallKey(rollCall);
    card.dataset.category = rollCall._category || '';

    // Photo / initials
    const wrap = document.createElement('div');
    wrap.className = 'photo-wrap';

    if (bioId) {
      const img = document.createElement('img');
      img.alt = name;
      img.src = 'https://www.congress.gov/img/member/' + bioId.toLowerCase() + '_200.jpg';
      img.onerror = () => { img.remove(); wrap.appendChild(makeInitials(initials(name), pc)); };
      wrap.appendChild(img);
    } else {
      wrap.appendChild(makeInitials(initials(name), pc));
    }

    // Name
    const nameEl = document.createElement('div');
    nameEl.className = 'member-name';
    nameEl.textContent = name;

    // Party + state
    const sub = document.createElement('div');
    sub.className = 'member-sub';

    const badge = document.createElement('span');
    badge.className = 'party-badge party-' + pc;
    badge.textContent = pc === 'D' ? 'Democrat' : pc === 'R' ? 'Republican' : (party || 'Independent');

    const stateEl = document.createElement('span');
    stateEl.className = 'member-state';
    stateEl.textContent = state;

    sub.append(badge, stateEl);

    // Vote result
    const voteEl = document.createElement('div');
    voteEl.className = 'vote-result ' + voteClass(pos);
    voteEl.textContent = voteDisplay(pos);

    // Bill bar
    const bar = document.createElement('div');
    bar.className = 'bill-bar';

    const billNum  = [rollCall.legislationType, rollCall.legislationNumber].filter(Boolean).join(' ');
    const question = rollCall.voteQuestion || rollCall.voteType || '';
    const result   = rollCall.result || '';
    const date     = formatDate(rollCall.startDate);

    const numEl = document.createElement('div');
    numEl.className = 'bill-number';
    numEl.textContent = billNum || 'Congressional Vote';

    const questionEl = document.createElement('div');
    questionEl.className = 'bill-question';
    questionEl.textContent = question;

    const metaEl = document.createElement('div');
    metaEl.className = 'bill-meta';

    const resultEl = document.createElement('span');
    resultEl.className = 'bill-meta-result';
    resultEl.textContent = result ? 'Result: ' + result : '';

    const dateEl = document.createElement('span');
    dateEl.className = 'bill-meta-date';
    dateEl.textContent = date;

    const hintEl = document.createElement('div');
    hintEl.className = 'bill-tap-hint';
    hintEl.textContent = '▲ tap for details';

    const categoryChip = document.createElement('div');
    categoryChip.className = 'bill-category-chip';
    categoryChip.textContent = rollCall._category || '';
    if (!rollCall._category) categoryChip.style.display = 'none';

    metaEl.append(resultEl, dateEl);
    bar.append(numEl, questionEl, metaEl, categoryChip, hintEl);
    bar.addEventListener('click', () => openPanel(rollCall));

    card.append(wrap, nameEl, sub, voteEl, bar);
    allCards.push(card);
    return card;
  }

  async function loadNextRollCall() {
    if (busy || rollCallIndex >= rollCalls.length) return;
    busy = true;

    const feedEl   = document.getElementById('feed');
    const rollCall = rollCalls[rollCallIndex++];
    console.log('roll call object:', rollCall);
    const rollNum  = rollCall.rollCallNumber;
    const congress = rollCall.congress || 119;
    const session  = rollCall.session  || 1;

    try {
      const res  = await fetch('http://localhost:3000/api/rollcall/' + congress + '/' + session + '/' + rollNum + '/members');
      const data = await res.json();
      console.log('members response:', data);

      const VOTE_ORDER = { 'Yea': 0, 'Nay': 1, 'Not Voting': 2 };
      const members = (data.houseRollCallVoteMemberVotes?.results || [])
        .slice()
        .sort((a, b) => (VOTE_ORDER[a.voteCast] ?? 3) - (VOTE_ORDER[b.voteCast] ?? 3));

      rollCall._members = members;

      if (sentinel) sentinel.remove();

      members.forEach(m => feedEl.appendChild(buildCard(m, rollCall)));
      if (rollCall._category) applyCategoryToRollCall(rollCall, rollCall._category);
      applyFilters();

      sentinel = document.createElement('div');
      sentinel.style.height = '1px';
      feedEl.appendChild(sentinel);

      if (endObserver) endObserver.disconnect();
      endObserver = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadNextRollCall();
      }, { root: feedEl, threshold: 1.0 });
      endObserver.observe(sentinel);

    } catch (err) {
      console.error('Failed to load roll call', rollNum, err);
    }

    busy = false;
  }

  async function init() {
    const loadingEl = document.getElementById('loading');
    const feedEl    = document.getElementById('feed');
    const errorEl   = document.getElementById('error');

    try {
      const res  = await fetch('http://localhost:3000/api/rollcalls');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      console.log('rollcalls response:', data);
      rollCalls = data.houseRollCallVotes || [];
      if (!rollCalls.length) throw new Error('No roll calls returned');

      loadingEl.remove();
      feedEl.hidden = false;

      await loadNextRollCall();
      applyFilters();

    } catch (err) {
      loadingEl.remove();
      errorEl.style.display = 'flex';
      console.error(err);
    }
  }

  initStateSelector();
  renderCategoryPills();
  init();
</script>
</body>
</html>
